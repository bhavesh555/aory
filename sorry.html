    <!DOCTYPE html>
<html>
<head>
<title>Sorry Maishaa Di</title>

<style>
body{
    background-color:#ffe6f0;
    font-family:Arial;
    text-align:center;
    margin-top:100px;
}

h1{
    color:#ff3366;
}

button{
    padding:12px 25px;
    font-size:18px;
    margin:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#yes{
    background-color:#4CAF50;
    color:white;
}

#no{
    background-color:#ff4d4d;
    color:white;
    position:absolute;
}
</style>
</head>

<body>

<h1>Maishaa Di, I am really sorry 🥺</h1>
<h2>Please forgive me?</h2>

<button id="yes" onclick="yesClicked()">Yes, I forgive you ❤️</button>
<button id="no">No 😡</button>

<script>

let noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", function(){

    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

});

function yesClicked(){
    document.body.innerHTML =
    "<h1>Thank you Maishaa Di ❤️</h1><h2>You are the best!</h2>";
}

</script>

</body>
</html>
